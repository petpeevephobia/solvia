version: '3.9'

services:
  # Caddy - Reverse Proxy & Web Server
  caddy:
    image: caddy:2-alpine
    container_name: solvia-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./app/static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - solvia-network
    depends_on:
      - app
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solvia-app
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    volumes:
      # For development - mount source code
      - ./app:/app/app:ro
      - ./logs:/app/logs
    networks:
      - solvia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.solvia.description=Solvia SEO Audit Tool API"
      - "com.solvia.service=api"

  # Redis Cache (Optional - for session management and caching)
  redis:
    image: redis:7-alpine
    container_name: solvia-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - solvia-network
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-solvia_redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  solvia-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  redis_data:
    driver: local