version: '3.9'

services:
  # Caddy - Reverse Proxy & Web Server
  caddy:
    image: caddy:2-alpine
    container_name: solvia-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./landing:/landing:ro
    networks:
      - solvia-network
    depends_on:
      - app
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Go API + React Frontend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solvia-app
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - ./reports:/app/reports
    networks:
      - solvia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.solvia.description=Solvia SEO Audit Tool V2 (Go + React)"
      - "com.solvia.service=api"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: solvia-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: solvia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solvia_db_prod_Xk9Lm3Np7Qr_2025}
      POSTGRES_DB: solvia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - solvia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solvia -d solvia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: solvia-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - solvia-network
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-solvia_redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  solvia-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
