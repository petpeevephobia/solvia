# Production overrides for docker-compose
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.9'

services:
  caddy:
    restart: always
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      # Remove source mount, only use configs
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./app/static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
      - /var/log/caddy:/var/log/caddy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  app:
    restart: always
    image: solvia-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_VERSION=${BUILD_VERSION:-latest}
        - BUILD_DATE=${BUILD_DATE:-unknown}
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      # Remove source code mount in production
      - ./logs:/app/logs
      # Add SSL certificates if needed
      - /etc/ssl/certs:/etc/ssl/certs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M

  redis:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 128M