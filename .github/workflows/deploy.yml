name: Deploy Solvia Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: 72.60.195.244
  SERVER_USER: root
  DEPLOY_DIR: /opt/solvia

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH with official action
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Test SSH connection
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "echo '✅ SSH connection successful'"

    - name: Deploy to Server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
          set -e  # Exit on any error

          echo "🔄 Starting deployment..."
          cd ${{ env.DEPLOY_DIR }}

          # Git pull latest changes
          echo "📥 Pulling latest code from GitHub..."
          git fetch origin
          git reset --hard origin/main
          git pull origin main

          echo "✅ Code updated successfully"

          # ULTRATHINK FIX: Force cleanup of existing containers
          echo "🧹 Cleaning up existing containers..."

          # Stop containers if running (ignore errors if not running)
          docker stop solvia-app solvia-redis solvia-caddy 2>/dev/null || true

          # Remove containers (ignore errors if not exist)
          docker rm -f solvia-app solvia-redis solvia-caddy 2>/dev/null || true

          # Clean up any orphaned containers with production config
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

          # Prune stopped containers
          docker container prune -f

          echo "✅ Cleanup completed"

          # Rebuild and restart containers WITH PRODUCTION CONFIG
          echo "🔧 Rebuilding Docker containers (production mode)..."
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

          # Wait for services to start
          echo "⏳ Waiting for services to start..."
          sleep 10

          # Verify deployment
          echo "🔍 Verifying deployment..."
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml ps
          docker logs solvia-app --tail 10

          echo "✅ Deployment completed successfully!"
        ENDSSH

    - name: Health Check
      run: |
        sleep 15
        response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.SERVER_HOST }}/health || echo "000")
        if [ "$response" = "200" ] || [ "$response" = "308" ]; then
          echo "✅ Deployment successful! Health check passed."
        else
          echo "❌ Health check failed with response: $response"
          exit 1
        fi

    - name: Notify Success
      if: success()
      run: echo "🚀 Solvia Dashboard deployed successfully!"

    - name: Notify Failure
      if: failure()
      run: echo "❌ Deployment failed. Check logs for details."