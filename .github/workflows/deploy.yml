name: Deploy Solvia Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: 72.60.195.244
  SERVER_USER: root
  DEPLOY_DIR: /opt/solvia

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh

        # Write SSH key with proper formatting
        cat > ~/.ssh/id_rsa << 'EOF'
        ${{ secrets.SERVER_SSH_KEY }}
        EOF

        # Fix any potential formatting issues
        sed -i 's/^ *//' ~/.ssh/id_rsa

        # Set proper permissions
        chmod 600 ~/.ssh/id_rsa

        # Add host to known hosts
        ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

        # Debug: Check key format (first line only, no sensitive data)
        echo "Key format check:"
        head -n 1 ~/.ssh/id_rsa

        # Test SSH connection
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "echo 'SSH connection successful'" || {
          echo "SSH connection failed. Please verify the SERVER_SSH_KEY secret is properly set."
          echo "Make sure to copy the ENTIRE content of id_rsa_solvia including:"
          echo "- -----BEGIN OPENSSH PRIVATE KEY-----"
          echo "- All the key content"
          echo "- -----END OPENSSH PRIVATE KEY-----"
          exit 1
        }

    - name: Deploy to Server
      run: |
        # Create deployment package
        tar czf deploy.tar.gz \
          --exclude=venv \
          --exclude=__pycache__ \
          --exclude=.git \
          --exclude=reports \
          --exclude=logs \
          --exclude='*.pyc' \
          --exclude=.env \
          app core migrations \
          *.py *.sh *.txt *.sql *.md \
          Dockerfile docker-compose*.yml Caddyfile* nginx-landing.conf Makefile

        # Upload to server
        scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa deploy.tar.gz ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_DIR }}/

        # Extract and restart services
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
          cd /opt/solvia
          tar xzf deploy.tar.gz
          rm deploy.tar.gz

          # Rebuild and restart containers
          docker-compose down
          docker-compose build --no-cache
          docker-compose up -d

          # Verify deployment
          sleep 10
          docker-compose ps
          docker logs solvia-app --tail 10
        ENDSSH

    - name: Health Check
      run: |
        sleep 15
        response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.SERVER_HOST }}/health || echo "000")
        if [ "$response" = "200" ] || [ "$response" = "308" ]; then
          echo "✅ Deployment successful! Health check passed."
        else
          echo "❌ Health check failed with response: $response"
          exit 1
        fi

    - name: Notify Success
      if: success()
      run: echo "🚀 Solvia Dashboard deployed successfully!"

    - name: Notify Failure
      if: failure()
      run: echo "❌ Deployment failed. Check logs for details."