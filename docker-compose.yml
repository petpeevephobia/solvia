version: '3.8'

services:
  # Go API Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: solvia-api
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - PORT=8080
      - DATABASE_URL=postgres://solvia:solvia_secret@postgres:5432/solvia?sslmode=disable
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - solvia-network
    restart: unless-stopped
    volumes:
      - ./web/dist:/app/web/dist:ro

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: solvia-postgres
    environment:
      POSTGRES_USER: solvia
      POSTGRES_PASSWORD: solvia_secret
      POSTGRES_DB: solvia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solvia -d solvia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solvia-network
    restart: unless-stopped

  # React Frontend (development server)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: solvia-web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - solvia-network
    profiles:
      - dev

  # pgAdmin (development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: solvia-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@solvia.app
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - solvia-network
    profiles:
      - dev

networks:
  solvia-network:
    driver: bridge

volumes:
  postgres_data:
