# Development overrides for docker-compose
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.9'

services:
  caddy:
    # Use localhost for development
    environment:
      - DOMAIN=localhost
    # Additional debug logging
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile", "--watch"]

  app:
    # Use single uvicorn process with reload for development
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "debug"]
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      # Mount source code for hot reload
      - ./app:/app/app
      - ./logs:/app/logs
      # Mount .env for easier updates
      - ./.env:/app/.env:ro

  redis:
    # Use default Redis password in development
    command: redis-server --save 20 1 --loglevel warning --requirepass dev_redis_password
    ports:
      # Expose Redis for debugging
      - "6379:6379"