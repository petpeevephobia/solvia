name: Deploy Solvia V2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: 72.60.195.244
  SERVER_USER: root
  DEPLOY_DIR: /opt/solvia

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Test SSH connection
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "echo '✅ SSH connection successful'"

    - name: Deploy to Server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
          set -e

          echo "🚀 Starting Solvia V2 deployment (Go + React)..."
          cd ${{ env.DEPLOY_DIR }}

          # Git pull latest changes
          echo "📥 Pulling latest code from GitHub..."
          git fetch origin
          git reset --hard origin/main
          git pull origin main

          echo "✅ Code updated successfully"

          # Stop existing containers
          echo "🧹 Stopping existing containers..."
          docker stop solvia-app solvia-caddy 2>/dev/null || true
          docker rm -f solvia-app solvia-caddy 2>/dev/null || true

          # Clean up orphaned containers
          docker-compose down --remove-orphans 2>/dev/null || true
          docker container prune -f

          # Clean up old images to save space
          docker image prune -f

          echo "✅ Cleanup completed"

          # Create web directory for Caddy
          mkdir -p /srv/web

          # Build and start containers
          echo "🔧 Building Docker containers (Go + React)..."
          docker-compose build --no-cache

          echo "🚀 Starting containers..."
          docker-compose up -d

          # Wait for services to start
          echo "⏳ Waiting for services to start..."
          sleep 20

          # Copy built frontend to Caddy serve location
          echo "📁 Setting up frontend assets..."
          docker cp solvia-app:/app/web/dist /srv/web/ 2>/dev/null || echo "Frontend served from container"

          # Verify deployment
          echo "🔍 Verifying deployment..."
          docker-compose ps
          echo ""
          echo "=== Container Logs ==="
          docker logs solvia-app --tail 20

          echo ""
          echo "✅ Deployment completed successfully!"
        ENDSSH

    - name: Health Check
      run: |
        sleep 25
        response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.SERVER_HOST }}/health || echo "000")
        if [ "$response" = "200" ] || [ "$response" = "308" ]; then
          echo "✅ Deployment successful! Health check passed (status: $response)"
        else
          echo "❌ Health check failed with response: $response"
          echo "Checking container logs..."
          ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "docker logs solvia-app --tail 50"
          exit 1
        fi

    - name: Notify Success
      if: success()
      run: echo "🚀 Solvia V2 (Go + React) deployed successfully!"

    - name: Notify Failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        ssh -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "docker logs solvia-app --tail 100" || true
