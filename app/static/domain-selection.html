<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Domain - Solvia</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/domain-selection.css">
</head>
<body>
    <div class="container">
        <div class="selection-card">
            <div class="header">
                <img src="/static/images/orange-svg-emblem.svg" alt="Solvia Logo" class="logo">
                <h1>Select Your Domain</h1>
                <p>Choose which website you'd like Solvia to track and analyze</p>
            </div>

            <div class="domain-list" id="domainList">
                <!-- Domains will be loaded here -->
                <div class="loading">Loading your domains...</div>
            </div>

            <div class="actions">
                <button onclick="refreshDomains()" class="refresh-btn" id="refreshBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Refresh Domains
                </button>
                <button onclick="reAuthenticate()" class="reauth-btn" id="reauthBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 12l2 2 4-4"></path>
                        <path d="M21 12c-1 0-2-.4-2-1s1-2 2-2 2 1 2 2-1 1-2 1z"></path>
                        <path d="M3 12c1 0 2-.4 2-1s-1-2-2-2-2 1-2 2 1 1 2 1z"></path>
                        <path d="M12 3c0 1-.4 2-1 2s-2-1-2-2 1-2 2-2 2 1 2 2z"></path>
                        <path d="M12 21c0-1-.4-2-1-2s-2 1-2 2 1 2 2 2 2-1 2-2z"></path>
                    </svg>
                    Re-authenticate with Google
                </button>
            </div>
        </div>
    </div>

    <script src="/static/domain-selection.js"></script>
</body>
</html>
