industry: construction
aliases: [architecture, building, renovation, contractor, engineering]
description: "Construction, architecture, and building services companies"

# Location-specific keyword strategies
locations:
  singapore:
    primary_keywords:
      - "construction company singapore"
      - "building contractor singapore"
      - "architecture firm singapore"
      - "renovation contractor singapore"
    secondary_keywords:
      - "commercial construction singapore"
      - "residential construction singapore"
      - "singapore building services"
      - "construction project management singapore"
    long_tail:
      - "best construction company in singapore"
      - "commercial building contractor singapore"
      - "residential renovation contractor singapore"
      - "architecture design firm singapore"

  malaysia:
    primary_keywords:
      - "construction company malaysia"
      - "building contractor malaysia"
      - "architecture firm malaysia"
    secondary_keywords:
      - "construction services malaysia"
      - "building renovation malaysia"

# Content strategy templates
content_strategies:
  local_seo:
    priority: high
    keywords_template: ["{brand} {location}", "{service} {location}", "{service} near me"]
    content_gaps:
      - "Best {service} in {location}"
      - "{service} contractors near me"
      - "How to choose {service} contractor"
      - "{location} construction companies"

  service_pages:
    priority: medium
    recommended_pages:
      - "Commercial Construction"
      - "Residential Construction"
      - "Renovation Services"
      - "Architecture & Design"
      - "Project Management"

  content_marketing:
    priority: medium
    topics:
      - "Construction project portfolios"
      - "Client testimonials and case studies"
      - "Building process guides"
      - "Material selection guides"
      - "Permit and regulation guides"

# SEO recommendations based on performance metrics
performance_thresholds:
  traffic:
    low: 10        # < 10 clicks = low traffic
    medium: 50     # 10-50 clicks = medium traffic
    high: 100      # > 100 clicks = high traffic

  position:
    page_1: 10     # Position <= 10 = page 1
    page_2: 20     # Position 10-20 = page 2

  ctr:
    low: 2.0       # < 2% CTR = poor titles/meta
    medium: 5.0    # 2-5% CTR = average
    high: 8.0      # > 8% CTR = excellent

# Response templates for different scenarios
response_patterns:
  low_traffic_high_impressions:
    issue: "Low click-through rate despite good visibility"
    recommendation: "Optimize meta titles and descriptions for {industry} keywords"
    priority: "high"

  poor_rankings:
    issue: "Rankings beyond page 1"
    recommendation: "Focus on {location}-specific content and local citations"
    priority: "critical"

  limited_exposure:
    issue: "Low impressions indicate poor keyword targeting"
    recommendation: "Create content targeting {industry} + {location} combinations"
    priority: "high"