# Local SEO measurement
tracking_monitoring:
  key_metrics:
    visibility:
      - "Local pack rankings for target keywords"
      - "Google Business Profile views and clicks"
      - "Local organic traffic growth"
      - "Brand searches from local area"

    engagement:
      - "Direction requests from Google Business Profile"
      - "Phone calls from local search"
      - "Website visits from local searches"
      - "Review quantity and rating average"

  tools_tracking:
    free_tools:
      - "Google Business Profile Insights"
      - "Google Search Console (local search performance)"
      - "Google Analytics (local traffic analysis)"
      - "Google My Business messages and reviews"

    paid_tools:
      - "BrightLocal (local rank tracking)"
      - "SEMrush (local keyword monitoring)"
      - "Moz Local (citation monitoring)"
      - "Whitespark (local citation finder)"

# Common local SEO issues
troubleshooting:
  google_business_profile:
    suspension_issues:
      causes:
        - "Fake or inaccurate business information"
        - "Policy violations or spam"
        - "Unverified or duplicate listings"
        - "Unusual activity or rapid changes"

      solutions:
        - "Submit reinstatement request with documentation"
        - "Ensure compliance with Google guidelines"
        - "Provide business registration documents"
        - "Remove duplicate or conflicting listings"

    low_visibility:
      common_causes:
        - "Incomplete or inconsistent NAP information"
        - "Limited or poor quality reviews"
        - "Insufficient local content and optimization"
        - "Weak local citation profile"

      improvement_strategies:
        - "Complete all Google Business Profile sections"
        - "Actively collect customer reviews"
        - "Create location-specific content"
        - "Build consistent local citations"

  citation_problems:
    inconsistent_information:
      - "Audit all existing citations for accuracy"
      - "Update incorrect information systematically"
      - "Create style guide for consistent formatting"
      - "Monitor for new inconsistent citations"

    duplicate_listings:
      - "Identify and claim duplicate listings"
      - "Request removal of unclaimed duplicates"
      - "Merge similar listings when possible"
      - "Prevent future duplicates through monitoring"

