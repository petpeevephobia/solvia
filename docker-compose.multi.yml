version: '3.8'

services:
  # Caddy reverse proxy
  caddy:
    image: caddy:2-alpine
    container_name: solvia-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.multi:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - solvia-network
    depends_on:
      - solvia-dashboard
      - solvia-landing

  # Main Solvia Dashboard/Admin (from main repo)
  solvia-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solvia-dashboard
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - solvia-network
    depends_on:
      - redis
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Solvia Landing Page (from solvia-site repo)
  solvia-landing:
    image: nginx:alpine
    container_name: solvia-landing
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ../solvia-site:/usr/share/nginx/html:ro
      - ./nginx-landing.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - solvia-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: solvia-redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - solvia-network
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  solvia-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  redis_data: